<!DOCTYPE html>
<html lang="sr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hvala na poruci | Petar Dizajn</title>

<meta name="description" content="Hvala na upitu! Javljam se uskoro.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#111,#050505);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
}

.container{
  max-width:700px;
  padding:20px;
}

/* CHECK ICON */
.check{
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(34,197,94,0.1);
  border:2px solid #22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  font-size:40px;
  color:#22c55e;
  animation:pop 0.6s ease;
}

@keyframes pop{
  0%{transform:scale(0.5);opacity:0}
  100%{transform:scale(1);opacity:1}
}

h1{
  font-size:42px;
  margin-bottom:10px;
}

p{
  color:#bbb;
  line-height:1.6;
  margin-bottom:25px;
}

/* BUTTONS */
.btn{
  display:inline-block;
  padding:14px 26px;
  margin:10px;
  background:linear-gradient(135deg,#0ea5e9,#38bdf8);
  color:#fff;
  text-decoration:none;
  border-radius:12px;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px);
  opacity:.9;
}

.btn.secondary{
  background:transparent;
  border:1px solid #38bdf8;
}

/* INFO BOX */
.info{
  margin-top:30px;
  padding:20px;
  border-radius:15px;
  background:rgba(56,189,248,0.08);
  border:1px solid rgba(56,189,248,0.2);
}

.highlight{
  color:#38bdf8;
}
</style>

</head>

<body>

<div class="container">

  <div class="check">✔</div>

  <h1>Hvala na poruci!</h1>

  <p>
    Tvoj upit je uspešno poslat.  
    Javljam ti se u roku od <span class="highlight">par minuta</span>.
  </p>

  <div class="info">
    ⚡ U međuvremenu možeš me kontaktirati direktno i ubrzati proces:
  </div>

  <!-- CTA dugmad -->
  <div style="margin-top:20px;">

    <a href="tel:+381643131636" class="btn">
      📞 Pozovi odmah
    </a>

    <a href="https://wa.me/381643131636" class="btn secondary">
      💬 WhatsApp
    </a>

  </div>

  <!-- POVRATAK -->
  <div style="margin-top:30px;">
    <a href="index.html" style="color:#888;text-decoration:none;">
      ← Nazad na početnu
    </a>
  </div>

</div>

</body>
</html>
